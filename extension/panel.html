<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open my files & apps</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="shell">
    <header class="title-bar">
      <div class="title-bar-leading">
        <img class="app-icon" src="icons/icon32.png" width="28" height="28" alt="" />
        <div class="title-text">
          <h1 data-i18n="title">Open my files & apps</h1>
          <p class="subtitle" data-i18n="subtitle">One-click open for your files & apps</p>
        </div>
      </div>
      <div class="title-bar-trailing">
        <label class="lang-label" for="languageSelect" data-i18n="language">Language</label>
        <select id="languageSelect" aria-label="Language">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
        <button type="button" id="btnClose" class="btn-icon-close">×</button>
      </div>
    </header>

    <div id="hostBanner" class="host-banner host-banner--hidden" role="status"></div>

    <main class="main">
      <section class="toolbar" aria-label="Add items">
        <button type="button" id="btnPickFile" class="btn btn-secondary" data-i18n="addFile">Add file</button>
        <button type="button" id="btnPickFolder" class="btn btn-secondary" data-i18n="addFolder">Add folder</button>
        <button type="button" id="btnAddUrl" class="btn btn-secondary" data-i18n="addUrl">Add URL</button>
      </section>

      <section class="session-actions">
        <button type="button" id="btnOpenAll" class="btn btn-primary" data-i18n="openAll">Open all</button>
        <button type="button" id="btnCloseSession" class="btn btn-outline" data-i18n="closeSession">Close session</button>
      </section>

      <div id="emptyState" class="empty-state">
        <p data-i18n="emptyHint">Add files, folders, or URLs. Requires the Windows helper for picks and for close session.</p>
      </div>

      <ul id="itemList" class="item-list" aria-label="Session items"></ul>
    </main>

    <footer class="footer">
      <p class="footer-note" data-i18n="footerNote">Drag the top bar to move. Resize this window like any app. Data stays on this device.</p>
      <div class="footer-meta">
        <a class="footer-brand" href="https://ai4context.com" target="_blank" rel="noopener noreferrer" data-i18n="brand">AI4Context</a>
        <span class="footer-sep">·</span>
        <span id="versionLabel" class="footer-version"></span>
      </div>
    </footer>
  </div>
  <script src="panel.js"></script>
</body>
</html>
